<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="overflow-x-auto">
      <table class="min-w-full bg-white">
        <thead class="bg-gray-100 whitespace-nowrap">
          <tr>
            <th class="p-4 text-left text-[13px] font-semibold text-slate-900">
              Title
            </th>
            <th class="p-4 text-left text-[13px] font-semibold text-slate-900">
              Category
            </th>
            <th class="p-4 text-left text-[13px] font-semibold text-slate-900">
              Role
            </th>
            <th class="p-4 text-left text-[13px] font-semibold text-slate-900">
              Price
            </th>
            <th class="p-4 text-left text-[13px] font-semibold text-slate-900">
              Remove
            </th>
          </tr>
        </thead>

        <tbody  id="tablepart" class="whitespace-nowrap">
          

        </tbody>
      </table>
    </div>
    <script>
        const tablepart = document.getElementById("tablepart")
        function GetallData() {
            fetch(`https://69baf21fb3dcf7e0b4be8434.mockapi.io/Product`)
            .then(res => res.json())
            .then(Data => Data.map(item => tablepart.innerHTML += `<tr class="hover:bg-gray-50">
            <td class="p-4 text-[15px] text-slate-900 font-medium">
              ${item.title}
            </td>
            <td class="p-4 text-[15px] text-slate-600 font-medium">
              ${item.category}
            </td>
            <td class="p-4 text-[15px] text-slate-600 font-medium">
              Admin
            </td>
            <td class="p-4 text-[15px] text-slate-600 font-medium">
              ${item.price}
            </td>
            <td class="p-4">
              <div class="flex items-center">
                <button onclick="deleteData('${item.id}')" title="Delete" class="cursor-pointer">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-red-500 hover:fill-red-700" viewBox="0 0 24 24">
                    <path
                      d="M19 7a1 1 0 0 0-1 1v11.191A1.92 1.92 0 0 1 15.99 21H8.01A1.92 1.92 0 0 1 6 19.191V8a1 1 0 0 0-2 0v11.191A3.918 3.918 0 0 0 8.01 23h7.98A3.918 3.918 0 0 0 20 19.191V8a1 1 0 0 0-1-1Zm1-3h-4V2a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v2H4a1 1 0 0 0 0 2h16a1 1 0 0 0 0-2ZM10 4V3h4v1Z"
                      data-original="#000000" />
                    <path d="M11 17v-7a1 1 0 0 0-2 0v7a1 1 0 0 0 2 0Zm4 0v-7a1 1 0 0 0-2 0v7a1 1 0 0 0 2 0Z"
                      data-original="#000000" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>`))
        }
        function deleteData(id) {
            fetch(`https://69baf21fb3dcf7e0b4be8434.mockapi.io/Product/${id}`,{
                method: "DELETE"
            })
            .then(res => res.json())
            .then(res => console.log(res))
            GetallData()
        }
        GetallData()
    </script>
</body>
</html>
