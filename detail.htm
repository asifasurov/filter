<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <div id="detailpart" ></div>
    <script>
        const detailpart = document.getElementById("detailpart")
        const params = new URLSearchParams(window.location.search)
        const id = params.get('id')
        fetch(`https://69baf21fb3dcf7e0b4be8434.mockapi.io/Product/${id}`)
            .then(res => res.json())
            .then(data => detailpart.innerHTML = `<div class="bg-white w-[20%] mx-auto my-10 shadow-sm border border-gray-200 rounded-lg p-3">
            <div class="aspect-[12/11] bg-gray-100 rounded-lg p-4">
                <img src="${data.image}" class="w-full h-full object-contain" />
            </div>
            <div class="flex gap-2 mt-4">
                <h5 class="text-base font-semibold text-slate-900">${data.title}</h5>
                <h6 class="text-base text-slate-900 font-bold ml-auto">${data.price}$</h6>
            </div>
            <p class="text-slate-600 text-[13px] mt-2">${data.category}</p>
            </div>`)
        
    </script>
</body>
</html>
